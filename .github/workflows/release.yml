name: Semantic Release

on:
  push:
    branches: [main, rc]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/github

      - name: Run semantic release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee release-output.txt
          if grep -q "Published release" release-output.txt; then
            VERSION=$(grep "next release version" release-output.txt | grep -oP '\d+\.\d+\.\d+(-rc\.\d+)?')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger infra repo RC deploy
        if: steps.release.outputs.released == 'true' && contains(steps.release.outputs.version, 'rc')
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_REPO_PAT }}" \
            https://api.github.com/repos/NeuralRipper/NeuralRipper-infra/dispatches \
            -d '{"event_type":"rc-deploy","client_payload":{"version":"v${{ steps.release.outputs.version }}"}}'
