services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: neuralripper
      MYSQL_USER: neuralripper
      MYSQL_PASSWORD: dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: neuralripper
      MYSQL_PASSWORD: dev
      MYSQL_DATABASE: neuralripper
      GOOGLE_CLIENT_ID: 885687504549-vun2868u6r1r4qgula373uq307haq62i.apps.googleusercontent.com
      JWT_SECRET_KEY: dev-secret-change-in-prod
      MODAL_TOKEN_ID: ak-7efH7y4kkFjhhqTkepxKuj
      MODAL_TOKEN_SECRET: as-GcxOQsULJpLLGbwKJg2zIc

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_WS_BASE_URL: ws://localhost:8000
        VITE_GOOGLE_CLIENT_ID: 885687504549-vun2868u6r1r4qgula373uq307haq62i.apps.googleusercontent.com
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
